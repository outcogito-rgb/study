<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습 캘린더</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f7f5f0;
    --surface: #fff;
    --border: #e8e4dc;
    --text: #2a2520;
    --text-muted: #8a8278;
    --accent: #e8622a;
    --rest-color: #aaa;
    --rest-light: #f5f5f5;
    --holiday-color: #e8622a;
    --holiday-light: #fdf0ea;
    --done-color: #2a2520;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 14px 60px; }

  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-family: 'Gmarket Sans', sans-serif; font-size: 24px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header p { margin-top: 4px; font-size: 12px; color: var(--text-muted); }

  .top-nav { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .nav-btn { padding: 8px 20px; border: 2px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 700; font-family: 'Gmarket Sans', sans-serif; cursor: pointer; background: white; color: var(--text-muted); transition: all .15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--text); border-color: var(--text); color: white; }

  .progress-cards { display: flex; gap: 10px; max-width: 780px; margin: 0 auto 20px; flex-wrap: wrap; }
  .progress-card { flex: 1; min-width: 140px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .progress-card .card-label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
  .progress-card .card-dot { width: 8px; height: 8px; border-radius: 50%; }
  .progress-card .card-count { font-family: 'Gmarket Sans', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .progress-card .card-count span { font-size: 12px; font-weight: 400; font-family: 'Noto Sans KR', sans-serif; color: var(--text-muted); }
  .mini-bar-track { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 999px; transition: width .5s; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 780px; margin: 0 auto 16px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .year-tabs { display: flex; gap: 8px; justify-content: center; max-width: 780px; margin: 0 auto 16px; }
  .year-tab { padding: 7px 20px; border: 2px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 700; font-family: 'Gmarket Sans', sans-serif; cursor: pointer; background: white; color: var(--text-muted); transition: all .15s; }
  .year-tab:hover { border-color: var(--accent); color: var(--accent); }
  .year-tab.active { background: var(--text); border-color: var(--text); color: white; }

  .months-container { display: flex; flex-direction: column; gap: 20px; max-width: 780px; margin: 0 auto; }
  .month-block { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .month-title { font-family: 'Gmarket Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 12px 18px; background: var(--text); color: white; }

  .weekday-row { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
  .weekday-cell { text-align: center; font-size: 10px; font-weight: 700; padding: 6px 0; color: var(--text-muted); }
  .weekday-cell.sun { color: #e05050; }
  .weekday-cell.sat { color: #4a90d9; }

  .days-grid { display: grid; grid-template-columns: repeat(7,1fr); }

  .day-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 80px; padding: 4px 5px; position: relative; cursor: pointer; transition: filter .15s; background: white; }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { filter: brightness(.96); }
  .day-cell.empty { background: var(--bg); cursor: default; }
  .day-cell.empty:hover { filter: none; }
  .day-cell.is-holiday-day { background: var(--holiday-light); }
  .day-cell.is-rest-day { background: var(--rest-light); }

  .day-num { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 3px; }
  .day-cell.today .day-num { background: var(--accent); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

  .subject-chips { display: flex; flex-direction: column; gap: 2px; }
  .subject-chip { display: flex; align-items: center; gap: 3px; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: 700; line-height: 1.3; }
  .chip-done { opacity: .5; text-decoration: line-through; }

  .holiday-label { font-size: 9px; color: var(--holiday-color); font-weight: 700; margin-top: 2px; }
  .rest-label    { font-size: 9px; color: var(--rest-color);    font-weight: 700; margin-top: 2px; }
  .modified-mark { position: absolute; bottom: 3px; right: 4px; font-size: 8px; color: var(--text-muted); }

  .settings-view { display: none; max-width: 600px; margin: 0 auto; }
  .settings-view.active { display: block; }
  .calendar-view { display: block; }
  .calendar-view.hidden { display: none; }

  .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .settings-section h3 { font-family: 'Gmarket Sans', sans-serif; font-size: 15px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .settings-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .settings-row label { font-size: 13px; color: var(--text-muted); min-width: 80px; }
  .settings-row input[type=month],
  .settings-row input[type=date],
  .settings-row input[type=number],
  .settings-row input[type=text] { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; width: 140px; }
  .settings-row input:focus { border-color: var(--accent); }
  .settings-row input[type=checkbox] { width: auto; }
  .settings-row input[type=color] { width: 40px; height: 36px; padding: 2px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; }
  .subject-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .subject-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .subject-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 10px; cursor: pointer; }
  .save-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; margin-top: 4px; }
  .save-btn:hover { opacity: .9; }

  /* 과목 카드 (설정) */
  .subject-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .subject-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .subject-card-header input[type=color] { width: 34px; height: 34px; padding: 2px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; flex-shrink: 0; }
  .subject-card-header input[type=text] { flex: 1; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; outline: none; }
  .subject-card-header input[type=text]:focus { border-color: var(--accent); }
  .subject-card-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .subject-card-row label { font-size: 12px; color: var(--text-muted); min-width: 60px; }
  .subject-card-row input[type=number],
  .subject-card-row input[type=date] { padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; width: 130px; }
  .subject-card-row input:focus { border-color: var(--accent); }
  .btn-delete { padding: 6px 12px; border: 1.5px solid #ffcccc; border-radius: 8px; font-size: 11px; font-weight: 700; color: #e05050; background: #fff5f5; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .btn-delete:hover { background: #ffe0e0; }
  .btn-add-subject { width: 100%; padding: 11px; border: 2px dashed var(--border); border-radius: 12px; font-size: 13px; font-weight: 700; color: var(--text-muted); background: white; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 4px; transition: all .15s; }
  .btn-add-subject:hover { border-color: var(--accent); color: var(--accent); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px; padding: 22px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-family: 'Gmarket Sans', sans-serif; font-size: 16px; margin-bottom: 4px; }
  .modal-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }

  .modal-subject-block { border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .modal-subject-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .modal-subject-dot { width: 10px; height: 10px; border-radius: 3px; }

  .status-btns { display: flex; gap: 6px; margin-bottom: 8px; }
  .status-btn { flex: 1; padding: 7px 4px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; background: white; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; transition: all .12s; text-align: center; }
  .status-btn:hover { border-color: var(--accent); }
  .status-btn.selected { background: var(--text); color: white; border-color: transparent; }

  .sessions-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .sessions-label { font-size: 11px; color: var(--text-muted); min-width: 46px; }
  .session-btns { display: flex; gap: 4px; }
  .session-btn { padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; background: white; color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; transition: all .12s; }
  .session-btn:hover { border-color: var(--accent); color: var(--accent); }
  .session-btn.active { color: white; border-color: transparent; }

  .done-row { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 6px 2px; }
  .done-row input { accent-color: var(--done-color); width: 15px; height: 15px; }

  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary   { background: var(--accent); color: white; }
  .btn-secondary { background: var(--border); color: var(--text); }

  .exam-banner { display: flex; gap: 10px; max-width: 780px; margin: 0 auto 20px; flex-wrap: wrap; }
  .exam-card { flex: 1; min-width: 140px; border-radius: 14px; padding: 14px 18px; position: relative; overflow: hidden; }
  .exam-card.national { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
  .exam-card.local    { background: linear-gradient(135deg, #e8622a 0%, #c94f1f 100%); }
  .exam-card-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.65); letter-spacing: .5px; margin-bottom: 6px; }
  .exam-card-dday { font-family: 'Gmarket Sans', sans-serif; font-size: 28px; font-weight: 700; color: white; line-height: 1; margin-bottom: 4px; }
  .exam-card-dday span { font-size: 14px; font-weight: 400; }
  .exam-card-sub { font-size: 11px; color: rgba(255,255,255,.7); }
  .exam-card-studyday { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,.15); border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 700; color: white; text-align: center; line-height: 1.4; }

  .day-type-btn { padding: 7px 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 11px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; background: white; color: var(--text-muted); transition: all .12s; }
  .day-type-btn:hover { border-color: var(--accent); }
  .day-type-btn.on-study    { background: #4a90d9; color: white; border-color: transparent; }
  .day-type-btn.on-cumreview{ background: #17a2b8; color: white; border-color: transparent; }
  .day-type-btn.on-rest     { background: var(--rest-color); color: white; border-color: transparent; }
  .day-type-btn.on-holiday  { background: var(--holiday-color); color: white; border-color: transparent; }

  @media (max-width: 480px) {
    .day-cell { min-height: 68px; }
    .progress-card { min-width: 120px; }
    .exam-card { min-width: 120px; }
  }
</style>
</head>
<body>

<header>
  <h1>학습 <span>캘린더</span></h1>
  <p id="headerSub"></p>
</header>

<div class="exam-banner" id="examBanner"></div>

<div class="top-nav">
  <button class="nav-btn active" onclick="showView('calendar')">📅 캘린더</button>
  <button class="nav-btn" onclick="showView('settings')">⚙️ 설정</button>
</div>

<div class="progress-cards" id="progressCards"></div>

<div class="legend" id="legend"></div>

<div class="calendar-view" id="calendarView">
  <div class="year-tabs" id="yearTabs"></div>
  <div class="months-container" id="monthsContainer"></div>
</div>

<div class="settings-view" id="settingsView">
  <div class="settings-section">
    <h3>📅 캘린더 기간</h3>
    <div class="settings-row">
      <label>시작 연월</label>
      <input type="month" id="cfg-calStart">
    </div>
    <div class="settings-row">
      <label>종료 연월</label>
      <input type="month" id="cfg-calEnd">
    </div>
  </div>

  <div class="settings-section" id="subject-settings"></div>

  <button class="save-btn" onclick="saveSettings()">저장하고 적용</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="modal-sub" id="modalSub"></div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:8px">날짜 태그 <span style="font-weight:400">(복수 선택 가능)</span></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="day-type-btn" id="dtype-study"     onclick="toggleDayType('study')">📚 학습일</button>
        <button class="day-type-btn" id="dtype-cumreview" onclick="toggleDayType('cumreview')">📋 누적복습</button>
        <button class="day-type-btn" id="dtype-rest"      onclick="toggleDayType('rest')">🛋️ 휴일</button>
        <button class="day-type-btn" id="dtype-holiday"   onclick="toggleDayType('holiday')">🎌 공휴일</button>
      </div>
    </div>
    <div id="modalSubjects"></div>
    <div class="modal-actions">
      <button class="btn btn-primary"   onclick="saveModal()">저장</button>
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script>
const EXAMS = [
  { id: 'national', label: '국가직', date: '2027-04-05', cls: 'national' },
  { id: 'local',    label: '지방직', date: '2027-06-19', cls: 'local'    },
];
const STUDY_START = '2026-06-07';

function renderExamBanner() {
  const el = document.getElementById('examBanner');
  el.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const studyStart = parseDate(STUDY_START);
  EXAMS.forEach(exam => {
    const examDate = parseDate(exam.date);
    const dday = Math.ceil((examDate - today) / (1000*60*60*24));
    const studyDay = Math.floor((today - studyStart) / (1000*60*60*24)) + 1;
    const ddayText = dday > 0 ? `D-${dday}` : dday === 0 ? 'D-Day' : `D+${Math.abs(dday)}`;
    const dateStr2 = `${exam.date.replace(/-/g,'.')} (${['일','월','화','수','목','금','토'][examDate.getDay()]})`;
    el.innerHTML += `
      <div class="exam-card ${exam.cls}">
        <div class="exam-card-studyday">📚 Study<br>Day ${studyDay > 0 ? studyDay : 1}</div>
        <div class="exam-card-label">${exam.label} 시험</div>
        <div class="exam-card-dday">${ddayText}<span> 일</span></div>
        <div class="exam-card-sub">${dateStr2}</div>
      </div>`;
  });
}

const DEFAULT_CONFIG = {
  calStart: '2026-06',
  calEnd:   '2027-06',
  subjects: [
    { id: 'vocab',    name: '단어',   color: '#4a90d9', lightColor: '#eaf3fb', enabled: true,  totalDays: 48, startDate: '2026-06-07', restDays: [5] },
    { id: 'grammar',  name: '문법',   color: '#9b6dce', lightColor: '#f3eefb', enabled: false, totalDays: 30, startDate: '2026-08-05', restDays: [5] },
    { id: 'syntax',   name: '구문',   color: '#2aab7a', lightColor: '#e8f8f2', enabled: false, totalDays: 30, startDate: '2026-08-05', restDays: [5] },
    { id: 'reading',  name: '독해',   color: '#e8922a', lightColor: '#fdf3e8', enabled: false, totalDays: 30, startDate: '2026-09-01', restDays: [5] },
    { id: 'exam',     name: '기출풀이', color: '#17a2b8', lightColor: '#e3f7fa', enabled: false, totalDays: 30, startDate: '2026-10-01', restDays: [5] },
    { id: 'admin',    name: '행정법', color: '#e84a5f', lightColor: '#fde8ea', enabled: false, totalDays: 30, startDate: '2026-10-01', restDays: [5] },
  ],
};

const HOLIDAYS = new Set([
  '2026-06-06','2026-08-15','2026-09-24','2026-09-25','2026-09-26',
  '2026-10-03','2026-10-09','2026-12-25',
  '2027-01-01','2027-01-27','2027-01-28','2027-01-29',
  '2027-03-01','2027-05-05','2027-05-13','2027-06-06',
]);
const HOLIDAY_NAMES = {
  '2026-06-06':'현충일','2026-08-15':'광복절',
  '2026-09-24':'추석','2026-09-25':'추석','2026-09-26':'추석',
  '2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'크리스마스',
  '2027-01-01':'신정','2027-01-27':'설','2027-01-28':'설날','2027-01-29':'설',
  '2027-03-01':'삼일절','2027-05-05':'어린이날','2027-05-13':'부처님오신날',
  '2027-06-06':'현충일',
};

// 색상에서 연한 배경색 자동 생성 (white 85% + color 15%)
function lightColorFrom(hex) {
  if (!hex || hex[0] !== '#') return '#f5f5f5';
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.round(r*.18+255*.82)},${Math.round(g*.18+255*.82)},${Math.round(b*.18+255*.82)})`;
}

function generateId() {
  return 'subj_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function loadConfig() {
  const saved = localStorage.getItem('eng_cal_config');
  if (!saved) return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  const parsed = JSON.parse(saved);
  // 구버전 저장값에 새 과목이 없으면 DEFAULT_CONFIG에서 보충
  const existingIds = new Set(parsed.subjects.map(s => s.id));
  DEFAULT_CONFIG.subjects.forEach(ds => {
    if (!existingIds.has(ds.id)) parsed.subjects.push(JSON.parse(JSON.stringify(ds)));
  });
  return parsed;
}
function saveConfig(cfg) { localStorage.setItem('eng_cal_config', JSON.stringify(cfg)); }

function loadOverrides() {
  const saved = localStorage.getItem('eng_cal_overrides');
  return saved ? JSON.parse(saved) : {};
}
function saveOverrides(ov) { localStorage.setItem('eng_cal_overrides', JSON.stringify(ov)); }

function loadDayOverrides() {
  const saved = localStorage.getItem('eng_cal_day_overrides');
  return saved ? JSON.parse(saved) : {};
}
function saveDayOverrides() { localStorage.setItem('eng_cal_day_overrides', JSON.stringify(dayOverrides)); }

let config = loadConfig();
let overrides = loadOverrides();
let dayOverrides = loadDayOverrides();

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function parseMonth(s) { const [y,m]=s.split('-').map(Number); return {y,m}; }

function buildSubjectSchedule(subj) {
  const ov = (overrides[subj.id] || {});
  const map = {};
  if (!subj.enabled) return map;

  let dayNum = 1;
  let cur = parseDate(subj.startDate);
  const {y: ey, m: em} = parseMonth(config.calEnd);
  const calEndDate = new Date(ey, em, 0);

  while (cur <= calEndDate) {
    const ds = dateStr(cur);
    const dow = cur.getDay();
    const userOv = ov[ds];
    const isHoliday = HOLIDAYS.has(ds);
    const isRestDay = subj.restDays.includes(dow);
    const isSkip = userOv ? userOv.skip : (isHoliday || isRestDay);
    const sessions = (!isSkip && userOv && userOv.sessions) ? userOv.sessions : 1;

    if (!isSkip && dayNum <= subj.totalDays) {
      const dayNums = [];
      for (let i = 0; i < sessions && dayNum + i <= subj.totalDays; i++) dayNums.push(dayNum + i);
      map[ds] = { dayNums, dayNum: dayNums[0], skip: false, done: userOv ? !!userOv.done : false, modified: !!userOv };
      dayNum += dayNums.length;
    } else if (isSkip) {
      map[ds] = { dayNums: [], dayNum: null, skip: true, done: false, modified: !!userOv };
    }
    cur = addDays(cur, 1);
  }
  return map;
}

function buildAllSchedules() {
  const all = {};
  config.subjects.forEach(s => { all[s.id] = buildSubjectSchedule(s); });
  return all;
}

function renderLegend() {
  const el = document.getElementById('legend');
  const enabled = config.subjects.filter(s => s.enabled);
  el.innerHTML = enabled.map(s =>
    `<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div>${s.name}</div>`
  ).join('') +
  `<div class="legend-item"><div class="legend-dot" style="background:var(--holiday-color)"></div>공휴일</div>` +
  `<div class="legend-item"><div class="legend-dot" style="background:var(--rest-color)"></div>휴일</div>`;

  const sub = document.getElementById('headerSub');
  sub.textContent = enabled.length ? enabled.map(s => s.name).join(' · ') + ' 통합 관리' : '과목을 설정해 주세요';
}

function renderProgressCards(allSchedules) {
  const el = document.getElementById('progressCards');
  el.innerHTML = '';
  config.subjects.filter(s => s.enabled).forEach(s => {
    const sched = allSchedules[s.id] || {};
    const done = Object.values(sched).filter(c => !c.skip && c.done)
      .reduce((acc, c) => acc + (c.dayNums ? c.dayNums.length : 1), 0);
    const total = s.totalDays;
    const pct = Math.round(done / total * 100);
    el.innerHTML += `
      <div class="progress-card">
        <div class="card-label"><div class="card-dot" style="background:${s.color}"></div>${s.name}</div>
        <div class="card-count">${done}<span> / ${total} day</span></div>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      </div>`;
  });
}

let activeYear = new Date().getFullYear();

function getMonthsByYear() {
  const {y:sy, m:sm} = parseMonth(config.calStart);
  const {y:ey, m:em} = parseMonth(config.calEnd);
  const byYear = {};
  let y=sy, m=sm;
  while (y<ey || (y===ey && m<=em)) {
    if (!byYear[y]) byYear[y]=[];
    byYear[y].push(m);
    m++; if(m>12){m=1;y++;}
  }
  return byYear;
}

function renderYearTabs(years) {
  const el = document.getElementById('yearTabs');
  el.innerHTML = '';
  years.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (y===activeYear?' active':'');
    btn.textContent = y+'년';
    btn.onclick = () => { activeYear=y; renderYearTabs(years); renderCalendar(); };
    el.appendChild(btn);
  });
}

function renderCalendar() {
  const allSchedules = buildAllSchedules();
  renderLegend();
  renderProgressCards(allSchedules);

  const container = document.getElementById('monthsContainer');
  container.innerHTML = '';
  const today = dateStr(new Date());
  const byYear = getMonthsByYear();
  const months = byYear[activeYear] || [];

  months.forEach(m => {
    const y = activeYear;
    const block = document.createElement('div');
    block.className = 'month-block';

    const titleEl = document.createElement('div');
    titleEl.className = 'month-title';
    titleEl.textContent = `${y}년 ${m}월`;
    block.appendChild(titleEl);

    const wRow = document.createElement('div');
    wRow.className = 'weekday-row';
    ['일','월','화','수','목','금','토'].forEach((d,i) => {
      const c = document.createElement('div');
      c.className = 'weekday-cell'+(i===0?' sun':i===6?' sat':'');
      c.textContent = d; wRow.appendChild(c);
    });
    block.appendChild(wRow);

    const grid = document.createElement('div');
    grid.className = 'days-grid';

    const firstDow = new Date(y,m-1,1).getDay();
    for (let i=0;i<firstDow;i++) {
      const e=document.createElement('div'); e.className='day-cell empty'; grid.appendChild(e);
    }

    const daysInMonth = new Date(y,m,0).getDate();
    for (let d=1;d<=daysInMonth;d++) {
      const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (ds===today) cell.classList.add('today');

      const dayOv = dayOverrides[ds];
      const dayTypes = dayOv ? (dayOv.types || []) : [];
      if (dayTypes.includes('rest'))      cell.classList.add('is-rest-day');
      if (dayTypes.includes('holiday'))   cell.classList.add('is-holiday-day');
      if (!dayOv && HOLIDAYS.has(ds))     cell.classList.add('is-holiday-day');

      const numEl = document.createElement('div');
      numEl.className = 'day-num'; numEl.textContent = d; cell.appendChild(numEl);

      if (HOLIDAYS.has(ds)) {
        const hl = document.createElement('div');
        hl.className = 'holiday-label'; hl.textContent = HOLIDAY_NAMES[ds]||'공휴일';
        cell.appendChild(hl);
      }

      const chips = document.createElement('div');
      chips.className = 'subject-chips';

      const extraLabels = {
        cumreview: { text: '📋 누적복습', color: '#17a2b8' },
        rest:      { text: '🛋️ 휴일',    color: 'var(--rest-color)' },
        holiday:   { text: '🎌 공휴일',  color: 'var(--holiday-color)' }
      };
      dayTypes.filter(t => t !== 'study').forEach(t => {
        const info = extraLabels[t];
        if (!info) return;
        const lbl = document.createElement('div');
        lbl.style.cssText = `font-size:10px;font-weight:700;margin-top:1px;color:${info.color}`;
        lbl.textContent = info.text;
        chips.appendChild(lbl);
      });
      if (dayTypes.length > 0 && !dayTypes.includes('study')) {
        cell.appendChild(chips);
        cell.addEventListener('click', () => openModal(ds, d, m, y, allSchedules));
        grid.appendChild(cell);
        continue;
      }

      config.subjects.filter(s=>s.enabled).forEach(s => {
        const info = allSchedules[s.id][ds];
        if (!info || info.skip) return;
        const chip = document.createElement('div');
        chip.className = `subject-chip${info.done?' chip-done':''}`;
        chip.style.background = s.lightColor;
        chip.style.color = s.color;
        const dayNums = info.dayNums || [info.dayNum];
        const dayNumText = dayNums.length > 1
          ? `${dayNums[0]}-${dayNums[dayNums.length-1]}`
          : dayNums[0];
        chip.innerHTML = `${info.done?'✓':''} ${s.name} ${dayNumText}`;
        chips.appendChild(chip);
      });
      cell.appendChild(chips);

      const subjOvs = config.subjects.filter(s => overrides[s.id] && overrides[s.id][ds]);
      if (subjOvs.length) {
        const mod = document.createElement('div');
        mod.className = 'modified-mark'; mod.textContent = '✎'; cell.appendChild(mod);
      }

      cell.addEventListener('click', () => openModal(ds, d, m, y, allSchedules));
      grid.appendChild(cell);
    }

    block.appendChild(grid);
    container.appendChild(block);
  });
}

// ── 모달 ──────────────────────────────────────────
let modalDs = null;
let modalState = {};
let modalDayTypes = new Set();
let modalCurrentSchedule = {};

function toggleDayType(type) {
  if (modalDayTypes.has(type)) modalDayTypes.delete(type);
  else modalDayTypes.add(type);
  refreshDayTypeBtns();
  document.getElementById('modalSubjects').style.display =
    modalDayTypes.has('study') || modalDayTypes.size === 0 ? 'block' : 'none';
}

function refreshDayTypeBtns() {
  ['study','cumreview','rest','holiday'].forEach(t => {
    const btn = document.getElementById('dtype-'+t);
    if (btn) btn.className = 'day-type-btn' + (modalDayTypes.has(t) ? ' on-'+t : '');
  });
}

function setSessions(subjId, n) {
  modalState[subjId].sessions = n;
  const subj = config.subjects.find(s => s.id === subjId);
  const info = modalCurrentSchedule[subjId];
  let previewText;
  if (!info || info.skip || modalState[subjId].skip) {
    previewText = '건너뜀';
  } else {
    const first = info.dayNums && info.dayNums.length > 0 ? info.dayNums[0] : info.dayNum;
    if (first == null) { previewText = '–'; }
    else {
      const last = Math.min(first + n - 1, subj.totalDays);
      previewText = n > 1 ? `${first}-${last}day` : `${first}day`;
    }
  }
  const previewEl = document.getElementById(`day-preview-${subjId}`);
  if (previewEl) previewEl.textContent = `(${previewText})`;
  [1,2,3].forEach(num => {
    const btn = document.getElementById(`session-btn-${subjId}-${num}`);
    if (!btn) return;
    btn.className = 'session-btn' + (num === n ? ' active' : '');
    btn.style = num === n ? `background:${subj.color};color:white;border-color:transparent` : '';
  });
}

function openModal(ds, d, m, y, allSchedules) {
  modalDs = ds; modalState = {}; modalCurrentSchedule = {};
  const existingTypes = (dayOverrides[ds] || {}).types || [];
  modalDayTypes = new Set(existingTypes.length ? existingTypes : ['study']);
  refreshDayTypeBtns();
  document.getElementById('modalSubjects').style.display =
    modalDayTypes.has('study') || modalDayTypes.size === 0 ? 'block' : 'none';
  document.getElementById('modalTitle').textContent = `${y}년 ${m}월 ${d}일`;
  document.getElementById('modalSub').textContent = HOLIDAYS.has(ds) ? `🎌 ${HOLIDAY_NAMES[ds]||'공휴일'}` : '';

  const container = document.getElementById('modalSubjects');
  container.innerHTML = '';

  config.subjects.filter(s=>s.enabled).forEach(s => {
    const info = (allSchedules[s.id]||{})[ds];
    const ov   = (overrides[s.id]||{})[ds];
    modalCurrentSchedule[s.id] = info;
    const isSkip = info ? info.skip : true;
    const isDone = info ? info.done : false;
    const dayNums = info && !info.skip ? (info.dayNums || [info.dayNum]) : [];
    const sessions = dayNums.length > 0 ? dayNums.length : (ov && ov.sessions ? ov.sessions : 1);
    modalState[s.id] = { skip: isSkip, done: isDone, sessions };

    let dayPreviewText;
    if (isSkip) dayPreviewText = '건너뜀';
    else if (dayNums.length > 1) dayPreviewText = `${dayNums[0]}-${dayNums[dayNums.length-1]}day`;
    else if (dayNums.length === 1) dayPreviewText = `${dayNums[0]}day`;
    else dayPreviewText = '–';

    const sessionBtns = [1,2,3].map(n => {
      const isActive = n === sessions;
      const style = isActive ? `background:${s.color};color:white;border-color:transparent` : '';
      return `<button class="session-btn${isActive?' active':''}" id="session-btn-${s.id}-${n}" onclick="setSessions('${s.id}',${n})" style="${style}">${n}회차</button>`;
    }).join('');

    const block = document.createElement('div');
    block.className = 'modal-subject-block';
    block.innerHTML = `
      <div class="modal-subject-title">
        <div class="modal-subject-dot" style="background:${s.color}"></div>
        ${s.name} <span id="day-preview-${s.id}" style="font-size:11px;color:var(--text-muted);font-weight:400">(${dayPreviewText})</span>
      </div>
      <div class="status-btns">
        <button class="status-btn ${!isSkip?'selected':''}" onclick="setSubjSkip('${s.id}',false,this)" style="${!isSkip?`background:${s.color};color:white;border-color:transparent`:''}">📚 학습</button>
        <button class="status-btn ${isSkip?'selected':''}"  onclick="setSubjSkip('${s.id}',true,this)"  style="${isSkip?'background:var(--rest-color);color:white;border-color:transparent':''}">🛋️ 건너뜀</button>
      </div>
      <div class="sessions-row" id="sessions-row-${s.id}" style="display:${!isSkip?'flex':'none'}">
        <span class="sessions-label">회차 수</span>
        <div class="session-btns">${sessionBtns}</div>
      </div>
      <div class="done-row" id="done-row-${s.id}" style="display:${!isSkip?'flex':'none'}">
        <input type="checkbox" id="done-${s.id}" ${isDone?'checked':''} onchange="setSubjDone('${s.id}',this.checked)">
        <label for="done-${s.id}">✅ 완료</label>
      </div>`;
    container.appendChild(block);
  });
  document.getElementById('modalOverlay').classList.add('open');
}

function setSubjSkip(subjId, skip, btn) {
  modalState[subjId].skip = skip;
  if (skip) modalState[subjId].done = false;
  const subj = config.subjects.find(s=>s.id===subjId);
  const btns = btn.parentElement.querySelectorAll('.status-btn');
  btns[0].className = 'status-btn'; btns[0].style = '';
  btns[1].className = 'status-btn'; btns[1].style = '';
  if (!skip) { btns[0].classList.add('selected'); btns[0].style=`background:${subj.color};color:white;border-color:transparent`; }
  else        { btns[1].classList.add('selected'); btns[1].style='background:var(--rest-color);color:white;border-color:transparent'; }
  document.getElementById(`done-row-${subjId}`).style.display = skip ? 'none' : 'flex';
  document.getElementById(`sessions-row-${subjId}`).style.display = skip ? 'none' : 'flex';
  const previewEl = document.getElementById(`day-preview-${subjId}`);
  if (previewEl) {
    if (skip) previewEl.textContent = '(건너뜀)';
    else setSessions(subjId, modalState[subjId].sessions || 1);
  }
}

function setSubjDone(subjId, done) { modalState[subjId].done = done; }

function saveModal() {
  if (!modalDs) { closeModal(); return; }
  const typesArr = [...modalDayTypes];
  if (typesArr.length === 0 || (typesArr.length === 1 && typesArr[0] === 'study')) {
    delete dayOverrides[modalDs];
  } else {
    dayOverrides[modalDs] = { types: typesArr };
  }
  saveDayOverrides();
  if (modalDayTypes.has('study') || modalDayTypes.size === 0) {
    config.subjects.filter(s=>s.enabled).forEach(s => {
      const st = modalState[s.id];
      if (!st) return;
      if (!overrides[s.id]) overrides[s.id] = {};
      overrides[s.id][modalDs] = { skip: st.skip, done: st.done, sessions: st.skip ? 1 : (st.sessions || 1) };
    });
  }
  saveOverrides(overrides);
  renderCalendar();
  closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalDs = null; modalState = {}; modalCurrentSchedule = {};
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('modalOverlay')) closeModal();
});

// ── 설정 (과목 자유 편집) ──────────────────────────
let tempSubjects = [];

function syncTempSubjectsFromDOM() {
  tempSubjects.forEach((s, i) => {
    const nameEl    = document.getElementById(`s-name-${i}`);
    const colorEl   = document.getElementById(`s-color-${i}`);
    const enabledEl = document.getElementById(`s-enabled-${i}`);
    const totalEl   = document.getElementById(`s-total-${i}`);
    const startEl   = document.getElementById(`s-start-${i}`);
    if (nameEl)    s.name     = nameEl.value.trim() || s.name;
    if (colorEl)   { s.color = colorEl.value; s.lightColor = lightColorFrom(colorEl.value); }
    if (enabledEl) s.enabled  = enabledEl.checked;
    if (totalEl)   s.totalDays = parseInt(totalEl.value) || s.totalDays;
    if (startEl)   s.startDate = startEl.value || s.startDate;
  });
}

function addSubject() {
  syncTempSubjectsFromDOM();
  const colors = ['#e8922a','#17a2b8','#e84a5f','#f5a623','#50c878','#ff69b4','#8b5e3c'];
  const usedColors = new Set(tempSubjects.map(s => s.color));
  const newColor = colors.find(c => !usedColors.has(c)) || '#888888';
  tempSubjects.push({
    id: generateId(),
    name: '새 과목',
    color: newColor,
    lightColor: lightColorFrom(newColor),
    enabled: true,
    totalDays: 30,
    startDate: new Date().toISOString().slice(0,10),
    restDays: [5],
  });
  renderSettingsForm();
  // 새 과목 이름 입력창에 포커스
  const lastIdx = tempSubjects.length - 1;
  const nameInput = document.getElementById(`s-name-${lastIdx}`);
  if (nameInput) { nameInput.select(); nameInput.focus(); }
}

function deleteSubject(index) {
  if (tempSubjects.length <= 1) { alert('과목이 최소 1개는 있어야 해요.'); return; }
  syncTempSubjectsFromDOM();
  tempSubjects.splice(index, 1);
  renderSettingsForm();
}

function renderSettingsForm() {
  if (tempSubjects.length === 0) tempSubjects = JSON.parse(JSON.stringify(config.subjects));
  document.getElementById('cfg-calStart').value = config.calStart;
  document.getElementById('cfg-calEnd').value   = config.calEnd;

  const el = document.getElementById('subject-settings');
  el.innerHTML = '<h3>📚 과목 설정</h3>';

  tempSubjects.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.innerHTML = `
      <div class="subject-card-header">
        <input type="color" id="s-color-${i}" value="${s.color}" title="색상 변경">
        <input type="text"  id="s-name-${i}"  value="${s.name}" placeholder="과목 이름">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);margin-left:auto;white-space:nowrap">
          <input type="checkbox" id="s-enabled-${i}" ${s.enabled?'checked':''}> 활성화
        </label>
        <button class="btn-delete" onclick="deleteSubject(${i})">삭제</button>
      </div>
      <div class="subject-card-row">
        <label>총 회차</label>
        <input type="number" id="s-total-${i}" value="${s.totalDays}" min="1" max="500">
      </div>
      <div class="subject-card-row">
        <label>시작일</label>
        <input type="date" id="s-start-${i}" value="${s.startDate}">
      </div>`;
    el.appendChild(card);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-subject';
  addBtn.textContent = '+ 새 과목 추가';
  addBtn.onclick = addSubject;
  el.appendChild(addBtn);
}

function saveSettings() {
  syncTempSubjectsFromDOM();
  config.calStart  = document.getElementById('cfg-calStart').value;
  config.calEnd    = document.getElementById('cfg-calEnd').value;
  config.subjects  = tempSubjects.map(s => ({ ...s }));
  tempSubjects = [];
  saveConfig(config);
  showView('calendar');
}

function showView(v) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', (v==='calendar'&&i===0)||(v==='settings'&&i===1));
  });
  document.getElementById('calendarView').classList.toggle('hidden', v!=='calendar');
  document.getElementById('settingsView').classList.toggle('active', v==='settings');
  document.getElementById('progressCards').style.display = v==='calendar'?'flex':'none';
  document.getElementById('legend').style.display = v==='calendar'?'flex':'none';
  document.getElementById('yearTabs').style.display = v==='calendar'?'flex':'none';
  if (v==='settings') { tempSubjects = []; renderSettingsForm(); }
  if (v==='calendar') renderCalendar();
}

renderExamBanner();
const byYear = getMonthsByYear();
const years = Object.keys(byYear).map(Number);
if (!years.includes(activeYear)) activeYear = years[0];
renderYearTabs(years);
renderCalendar();
</script>
